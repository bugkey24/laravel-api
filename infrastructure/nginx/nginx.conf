events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        # The Main Server (this machine)
        server 172.28.176.1:8000 max_fails=3 fail_timeout=30s;
        
        # External Worker Servers
                server 192.168.1.11:8000 max_fails=3 fail_timeout=30s;
        server 192.168.1.12:8000 max_fails=3 fail_timeout=30s;
    }
    
    server {
        listen 80;
        
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Basic health check configuration
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # Status page for monitoring
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.28.176.1;
            deny all;
        }
    }
}

